services:
  postgres:
    image: postgres:16
    container_name: pos-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_dev
    ports:
      - "5432:5432"
    volumes:
      - pos_pg_data:/var/lib/postgresql/data

volumes:
  pos_pg_data:
